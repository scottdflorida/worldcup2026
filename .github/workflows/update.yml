name: Update site

# Polls the live World Cup feed often during match hours and rebuilds the site,
# but only COMMITS when results actually changed — so each real result is one
# Cloudflare Pages deploy (well under the free 500/month cap), and the site
# refreshes within ~5 min of a match result landing in the feed.
#
# Triggers:
#   - schedule: every 5 min across the daily match window (UTC, ~14:00–08:00 to
#     cover late knockouts that run to extra time/penalties), + a daily safety run
#   - workflow_dispatch: the on-site "Update now" button calls this via the
#     Cloudflare Pages Function at functions/api/refresh.js
on:
  schedule:
    - cron: "*/5 14-23 * * *"    # 14:00–23:59 UTC — every 5 min during matches
    - cron: "*/5 0-7 * * *"      # 00:00–07:59 UTC — late kickoffs + extra time & penalties
                                 #   (a ~03:00 UTC knockout can run past 06:00)
    - cron: "0 11 * * *"         # daily safety net
    - cron: "0 13 * * *"         # 06:00 PT — daily betting-odds refresh
  workflow_dispatch:
    inputs:
      refresh_odds:
        description: "Also refresh betting odds"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: site-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (Anthropic SDK for blurb generation)
        run: pip install anthropic

      - name: Refresh data and rebuild the site
        # Both keys are optional repo secrets:
        #   ANTHROPIC_API_KEY — regenerate road-to-final blurbs after each match.
        #   ODDS_API_KEY      — pull public match odds for the betting pool
        #                       (TTL-guarded, ~3x/day; falls back to model odds).
        # Without them the site still builds from whatever is committed.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          # refresh odds once a day at 06:00 PT (or on a manual run that asks for it)
          REFRESH_ODDS: ${{ (github.event.schedule == '0 13 * * *' || inputs.refresh_odds) && '1' || '' }}
        run: python3 scripts/update.py

      - name: Commit & push only if results changed
        run: |
          git config user.name "worldcup-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No new results — nothing to publish."
          else
            git commit -m "results: refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "Published updated results."
          fi
