name: Daily update

# Refreshes the live World Cup feed once a day, rebuilds the static site, and
# commits the result. Cloudflare Pages (connected to this repo) then redeploys
# automatically on the push. Can also be run on demand from the Actions tab.
on:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC daily (after the previous night's games)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh data and rebuild the site
        run: python3 scripts/update.py

      - name: Commit & push if anything changed
        run: |
          git config user.name "worldcup-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "chore: daily refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
